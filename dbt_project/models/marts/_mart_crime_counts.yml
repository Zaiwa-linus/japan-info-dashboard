version: 2

models:
  - name: mart_crime_counts
    description: "犯罪統計の件数・人員系指標（認知件数/検挙件数/検挙人員）を都道府県別に提供（2006-2016年）"
    columns:
      - name: area_code
        description: "都道府県コード"
      - name: area_name
        description: "都道府県名"
      - name: year
        description: "調査年（整数）"
      - name: recognized_count_value
        description: "認知件数"
      - name: arrested_count_value
        description: "検挙件数"
      - name: arrested_persons_value
        description: "検挙人員"
