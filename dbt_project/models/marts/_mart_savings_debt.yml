version: 2

models:
  - name: mart_savings_debt
    description: "二人以上世帯の貯蓄・負債・年間収入を県庁所在市別に提供（2002-2024年）。単位：万円。"
    columns:
      - name: area_code
        description: "都道府県コード"
      - name: area_name
        description: "県庁所在市名"
      - name: year
        description: "調査年（整数）"
      - name: annual_income_value
        description: "年間収入（万円）"
      - name: savings_total_value
        description: "貯蓄現在高（万円）"
      - name: debt_total_value
        description: "負債現在高（万円）"
