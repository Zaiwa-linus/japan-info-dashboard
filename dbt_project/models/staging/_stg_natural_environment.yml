version: 2

models:
  - name: stg_natural_environment
    description: "社会・人口統計体系 - Ｂ 自然環境（都道府県別）。土地面積、自然公園、植生自然度、気象データなど44指標を整形したステージングモデル。"
    columns:
      - name: observation_code
        description: "観測値の分類コード"
        tests:
          - accepted_values:
              values: ["00001"]
      - name: observation_name
        description: "観測値の分類名称"
        tests:
          - accepted_values:
              values: ["観測値"]
      - name: indicator_code
        description: "自然環境指標の分類コード（B1101〜B4112）"
        tests:
          - accepted_values:
              values:
                - "B1101"
                - "B1102"
                - "B1103"
                - "B1104"
                - "B1105"
                - "B1106"
                - "B1107"
                - "B1108"
                - "B1201"
                - "B120101"
                - "B120102"
                - "B120103"
                - "B120104"
                - "B120105"
                - "B120106"
                - "B120107"
                - "B1303"
                - "B2101"
                - "B2102"
                - "B2103"
                - "B2104"
                - "B2105"
                - "B3101"
                - "B3102"
                - "B3103"
                - "B3104"
                - "B3105"
                - "B3106"
                - "B3107"
                - "B3108"
                - "B3109"
                - "B3110"
