                - "B4106"
                - "B4107"
                - "B4108"
                - "B4109"
                - "B4110"
                - "B4111"
                - "B4112"
      - name: indicator_name
        description: "自然環境指標の名称"
      - name: area_code
        description: "都道府県コード"
        tests:
          - accepted_values:
              values:
                - "00000"
                - "01000"
                - "02000"
                - "03000"
