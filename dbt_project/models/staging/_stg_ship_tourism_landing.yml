version: 2

models:
  - name: stg_ship_tourism_landing
    description: "出入国管理統計 - 船舶観光上陸許可（国籍・港別）。クルーズ船による観光上陸者数を整形したステージングモデル。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["420"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["船舶観光上陸許可を受けた外国人"]
      - name: nationality_code
        description: "国籍・地域コード（177種類のため accepted_values テスト対象外）"
      - name: nationality_name
        description: "国籍・地域の名称（177種類のため accepted_values テスト対象外）"
