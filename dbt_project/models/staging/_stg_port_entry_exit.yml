version: 2

models:
  - name: stg_port_entry_exit
    description: "出入国管理統計 - 港別 出入国者。空港・港別の出入国者数を整形したステージングモデル。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["140"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["出入国者"]
      - name: traveler_type_code
        description: "出入国者区分コード"
        tests:
          - accepted_values:
              values: ["100", "110", "120", "130"]
      - name: traveler_type_name
        description: "出入国者区分の名称"
        tests:
          - accepted_values:
              values: ["協定該当者", "外国人", "日本人", "計"]
      - name: direction_code
        description: "入国・出国の方向コード"
        tests:
          - accepted_values:
              values: ["100", "110", "120"]
      - name: direction_name
        description: "入国・出国の方向名称"
        tests:
          - accepted_values:
              values: ["入国者", "出国者", "総数"]
      - name: port_code
        description: "港コード（352種類のため accepted_values テスト対象外）"
      - name: port_name
        description: "港の名称（352種類のため accepted_values テスト対象外）"
      - name: year_code
        description: "年次コード"
        tests:
          - accepted_values:
              values:
                - "1997000000"
                - "1998000000"
                - "1999000000"
                - "2000000000"
                - "2001000000"
                - "2002000000"
                - "2003000000"
                - "2004000000"
