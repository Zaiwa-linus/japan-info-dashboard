                - "2015000000"
                - "2016000000"
                - "2017000000"
                - "2018000000"
                - "2019000000"
                - "2020000000"
                - "2021000000"
                - "2022000000"
                - "2023000000"
                - "2024000000"
      - name: year_name
        description: "年次の表示名称"
        tests:
          - accepted_values:
              values:
                - "1997年"
                - "1998年"
                - "1999年"
                - "2000年"
