version: 2

models:
  - name: stg_population_migration
    description: "住民基本台帳人口移動報告 - 移動前の住所地別転入者数。市区町村間の人口移動データを整形したステージングモデル。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["18"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["移動前の住所地別転入者数"]
      - name: current_address_code
        description: "移動後の住所地コード（1960種類のため accepted_values テスト対象外）"
      - name: current_address_name
        description: "移動後の住所地名称（1866種類のため accepted_values テスト対象外）"
      - name: nationality_code
        description: "国籍コード"
        tests:
          - accepted_values:
              values: ["60000", "61000", "62000"]
      - name: nationality_name
        description: "国籍の名称"
        tests:
          - accepted_values:
              values: ["外国人移動者", "日本人移動者", "移動者"]
      - name: previous_address_code
        description: "移動前の住所地コード（1832種類のため accepted_values テスト対象外）"
      - name: previous_address_name
        description: "移動前の住所地名称（1681種類のため accepted_values テスト対象外）"
      - name: year_code
        description: "年次コード"
        tests:
          - accepted_values:
              values: ["2024000000"]
      - name: year_name
        description: "年次の表示名称"
        tests:
          - accepted_values:
              values: ["2024年"]
      - name: unit_name
        description: "値の単位"
        tests:
          - accepted_values:
              values: ["人"]
      - name: raw_value
        description: "指標の数値（型キャスト済み）"
