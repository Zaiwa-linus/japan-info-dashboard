version: 2

models:
  - name: stg_birth_death_by_prefecture
    description: "人口推計 - 都道府県別 出生児数・死亡者数（日本人・外国人、男女別）。2023年10月〜2024年9月の年間データ。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["012"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["出生児数・死亡者数"]
      - name: birth_death_code
        description: "出生児数・死亡者数の区分コード"
        tests:
          - accepted_values:
              values: ["001", "002"]
      - name: birth_death_name
        description: "出生児数・死亡者数の区分名称"
        tests:
          - accepted_values:
              values: ["出生児数", "死亡者数"]
      - name: gender_code
        description: "男女別コード"
        tests:
          - accepted_values:
              values: ["000", "001", "002"]
      - name: gender_name
        description: "男女別の名称（男女計、男、女）"
        tests:
          - accepted_values:
              values: ["男女計", "男", "女"]
      - name: nationality_code
        description: "日本人・外国人の区分コード"
        tests:
          - accepted_values:
              values: ["001", "002"]
      - name: nationality_name
        description: "日本人・外国人の区分名称"
        tests:
          - accepted_values:
              values: ["日本人", "外国人"]
      - name: area_code
        description: "全国・都道府県コード"
        tests:
          - accepted_values:
              values:
                - "00000"
                - "01000"
                - "02000"
                - "03000"
                - "04000"
                - "05000"
                - "06000"
                - "07000"
                - "08000"
                - "09000"
                - "10000"
                - "11000"
                - "12000"
                - "13000"
                - "14000"
                - "15000"
                - "16000"
                - "17000"
                - "18000"
                - "19000"
                - "20000"
                - "21000"
                - "22000"
                - "23000"
                - "24000"
                - "25000"
                - "26000"
                - "27000"
                - "28000"
                - "29000"
                - "30000"
                - "31000"
                - "32000"
                - "33000"
                - "34000"
                - "35000"
                - "36000"
                - "37000"
                - "38000"
                - "39000"
                - "40000"
                - "41000"
                - "42000"
                - "43000"
                - "44000"
                - "45000"
                - "46000"
                - "47000"
      - name: area_name
        description: "全国・都道府県名"
      - name: year_code
        description: "年次コード"
        tests:
          - accepted_values:
              values: ["2023001011"]
      - name: year_name
        description: "年次の表示名称"
        tests:
          - accepted_values:
              values: ["2023年10月～2024年9月"]
      - name: unit_name
        description: "値の単位"
        tests:
          - accepted_values:
              values: ["人"]
      - name: raw_value
        description: "出生児数または死亡者数（bigint型にキャスト済み）"
