version: 2

models:
  - name: stg_birth_death_by_prefecture
    description: "人口推計 - 都道府県別 出生児数・死亡者数。都道府県ごとの出生児数・死亡者数を整形したステージングモデル。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["012"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["出生児数・死亡者数"]
      - name: birth_death_code
        description: "出生児数・死亡者数の分類コード"
        tests:
          - accepted_values:
              values: ["001", "002"]
      - name: birth_death_name
        description: "出生児数・死亡者数の分類名称"
        tests:
          - accepted_values:
              values: ["出生児数", "死亡者数"]
      - name: gender_code
        description: "男女別コード"
        tests:
          - accepted_values:
              values: ["000", "001", "002"]
      - name: gender_name
        description: "男女別の名称"
        tests:
          - accepted_values:
              values: ["女", "男", "男女計"]
      - name: nationality_code
        description: "日本人・外国人の区分コード"
        tests:
          - accepted_values:
              values: ["001", "002"]
      - name: nationality_name
        description: "日本人・外国人の区分名称"
        tests:
          - accepted_values:
              values: ["外国人", "日本人"]
