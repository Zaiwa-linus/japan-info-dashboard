version: 2

models:
  - name: stg_economic_base
    description: "社会・人口統計体系 - Ｃ 経済基盤（都道府県別）。県内総生産額、県民所得など経済基盤指標を整形したステージングモデル。"
    columns:
      - name: observation_code
        description: "観測値の分類コード"
        tests:
          - accepted_values:
              values: ["00001"]
      - name: observation_name
        description: "観測値の分類名称"
        tests:
          - accepted_values:
              values: ["観測値"]
      - name: indicator_code
        description: "経済基盤指標の分類コード（548種類のため accepted_values テスト対象外）"
