version: 2

models:
  - name: stg_population
    description: "人口推計 - 都道府県・男女別人口。都道府県ごとの総人口・男女別人口および人口増減を整形したステージングモデル。"
    columns:
      - name: item_code
        description: "表章項目コード"
        tests:
          - accepted_values:
              values: ["008"]
      - name: item_name
        description: "表章項目名称"
        tests:
          - accepted_values:
              values: ["人口"]
      - name: population_type_code
        description: "人口及び人口増減の分類コード"
        tests:
          - accepted_values:
              values: ["204", "207", "211", "212", "213"]
      - name: population_type_name
        description: "人口及び人口増減の分類名称"
        tests:
          - accepted_values:
              values: ["人口", "国籍の異動による純増減", "増減の計", "社会増減", "自然増減"]
      - name: gender_code
        description: "男女別コード"
        tests:
          - accepted_values:
              values: ["000", "001", "002"]
      - name: gender_name
        description: "男女別の名称"
        tests:
          - accepted_values:
              values: ["女", "男", "男女計"]
      - name: population_category_code
        description: "人口区分コード"
        tests:
          - accepted_values:
              values: ["001", "002"]
      - name: population_category_name
        description: "人口区分の名称"
        tests:
          - accepted_values:
              values: ["日本人人口", "総人口"]
      - name: area_code
        description: "全国・都道府県コード"
