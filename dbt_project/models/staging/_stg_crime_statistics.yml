version: 2

models:
  - name: stg_crime_statistics
    description: "犯罪統計 - 都道府県別 刑法犯 認知・検挙件数。管区警察局別の犯罪統計を整形したステージングモデル。"
    columns:
      - name: crime_metric_code
        description: "認知・検挙件数・検挙人員の分類コード"
        tests:
          - accepted_values:
              values: ["100", "110", "120", "130"]
      - name: crime_metric_name
        description: "認知・検挙件数・検挙人員の分類名称"
        tests:
          - accepted_values:
              values: ["検挙人員", "検挙件数", "検挙率", "認知件数"]
      - name: police_district_code
        description: "管区警察局コード"
