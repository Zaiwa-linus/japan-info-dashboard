version: 2

models:
  - name: int_prep_retail_sales
    description: "商業動態統計 - 4業態（コンビニ・家電量販店・ドラッグストア・ホームセンター）の都道府県別月次データ（縦持ち）。月次のみに絞り込み、増減率を除外。"
    columns:
      - name: unit_code
        description: "単位コード"
      - name: unit_name
        description: "単位名称（百万円、店）"
      - name: header_item_code
        description: "表頭集計項目コード"
      - name: header_item_name
        description: "表頭集計項目名称（販売額/販売額等、店舗数）"
      - name: side_item_code
        description: "表側集計項目コード"
      - name: side_item_name
        description: "表側集計項目名称（販売額等）"
      - name: area_code
        description: "都道府県コード"
      - name: area_name
        description: "都道府県名"
      - name: time_code
        description: "時間軸コード（月次のみ）"
      - name: time_name
        description: "時間軸の表示名称（例: 2024年1月）"
      - name: store_type_name
        description: "業態名（コンビニ、家電量販店、ドラッグストア、ホームセンター）"
      - name: raw_value
        description: "値（double型）"
