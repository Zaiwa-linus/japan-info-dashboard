version: 2

models:
  - name: int_prep_population_migration
    description: "都道府県レベルの転入者データ。市区町村行を除外し、都道府県間の移動に絞り込み。"
    columns:
      - name: current_address_code
        description: "移動後の住所地（現住地）コード（都道府県レベル）"
      - name: current_address_name
        description: "移動後の住所地（現住地）名称"
      - name: nationality_code
        description: "国籍区分コード"
      - name: nationality_name
        description: "国籍区分名称（移動者・日本人移動者・外国人移動者）"
      - name: previous_address_code
        description: "移動前の住所地（前住地）コード（総数または都道府県レベル）"
      - name: previous_address_name
        description: "移動前の住所地（前住地）名称"
      - name: year_name
        description: "年次の表示名称"
      - name: raw_value
        description: "転入者数（人）"
