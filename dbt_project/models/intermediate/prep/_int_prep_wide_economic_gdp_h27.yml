version: 2

models:
  - name: int_prep_wide_economic_gdp_h27
    description: "平成27年基準の県内総生産額（総額＋第1/2/3次産業別）の都道府県別横持ちデータ（2011-2021年）。単位: 百万円。"
    columns:
      - name: area_code
        description: "都道府県コード"
      - name: area_name
        description: "都道府県名"
      - name: year
        description: "調査年（整数）"
      - name: gdp_total_value
        description: "県内総生産額（百万円）"
        tests:
          - not_null
      - name: gdp_primary_value
        description: "第1次産業 県内総生産額（百万円）"
      - name: gdp_secondary_value
        description: "第2次産業 県内総生産額（百万円）"
      - name: gdp_tertiary_value
        description: "第3次産業 県内総生産額（百万円）"
