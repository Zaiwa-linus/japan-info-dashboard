version: 2

models:
  - name: int_wide_natural_env_climate
    description: "自然環境 - 気象の横持ちモデル。年平均気温、最高・最低気温、快晴・曇天・降水・雪日数、日照時間、降水量、積雪、湿度を地域×年で横持ちにしたもの。"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - area_code
            - survey_year
    columns:
      - name: area_code
        description: "都道府県コード"
        tests:
          - not_null
      - name: area_name
        description: "都道府県名"
        tests:
          - not_null
      - name: year_code
        description: "調査年コード"
        tests:
          - not_null
      - name: survey_year
        description: "調査年（整数）"
        tests:
          - not_null
      - name: avg_temperature_celsius
        description: "B4101 年平均気温（℃）"
      - name: max_temperature_celsius
        description: "B4102 最高気温（日最高気温の月平均の最高値）（℃）"
      - name: min_temperature_celsius
        description: "B4103 最低気温（日最低気温の月平均の最低値）（℃）"
      - name: clear_sky_days
        description: "B4104 快晴日数（年間）（日）"
      - name: cloudy_days
        description: "B4105 曇天日数（年間）（日）"
      - name: rainy_days
        description: "B4106 降水日数（年間）（日）"
      - name: snow_days
        description: "B4107 雪日数（年間）（日）"
      - name: sunshine_hours
        description: "B4108 日照時間（年間）（時間）"
      - name: precipitation_mm
        description: "B4109 降水量（年間）（mm）"
      - name: max_snow_depth_cm
        description: "B4110 最深積雪（cm）"
      - name: avg_relative_humidity_pct
        description: "B4111 年平均相対湿度（%）"
      - name: min_relative_humidity_pct
        description: "B4112 最小相対湿度（年間）（%）"
