version: 2

models:
  - name: int_prep_wide_crime_counts
    description: "刑法犯の認知件数・検挙件数・検挙人員の都道府県別横持ちデータ（2006-2016年）"
    columns:
      - name: area_code
        description: "都道府県コード"
      - name: area_name
        description: "都道府県名"
      - name: year
        description: "調査年（整数）"
      - name: recognized_count_value
        description: "認知件数（件）"
        tests:
          - not_null
      - name: arrested_count_value
        description: "検挙件数（件）"
      - name: arrested_persons_value
        description: "検挙人員（人）"
