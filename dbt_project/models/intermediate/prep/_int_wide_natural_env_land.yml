version: 2

models:
  - name: int_wide_natural_env_land
    description: "自然環境 - 土地面積・地積の横持ちモデル。総面積、可住地面積、林野面積、評価総地積（用途別）、人工造林面積を地域×年で横持ちにしたもの。"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - area_code
            - survey_year
    columns:
      - name: area_code
        description: "都道府県コード"
        tests:
          - not_null
      - name: area_name
        description: "都道府県名"
        tests:
          - not_null
      - name: year_code
        description: "調査年コード"
        tests:
          - not_null
      - name: survey_year
        description: "調査年（整数）"
        tests:
          - not_null
      - name: total_area_excl_northern_ha
        description: "B1101 総面積（北方地域及び竹島を除く）（ha）"
      - name: total_area_incl_northern_ha
        description: "B1102 総面積（北方地域及び竹島を含む）（ha）"
      - name: habitable_area_ha
        description: "B1103 可住地面積（ha）"
      - name: major_lake_area_ha
        description: "B1104 主要湖沼面積（ha）"
      - name: forest_and_field_area_ha
        description: "B1105 林野面積（ha）"
      - name: forest_area_ha
        description: "B1106 森林面積（ha）"
      - name: grassland_area_ha
        description: "B1107 森林以外の草生地面積（ha）"
      - name: nature_conservation_area_ha
        description: "B1108 自然環境保全地域面積（ha）"
      - name: assessed_land_total_m2
        description: "B1201 評価総地積（課税対象土地）（m2）"
      - name: assessed_land_paddy_m2
        description: "B120101 評価総地積（田）（m2）"
      - name: assessed_land_field_m2
        description: "B120102 評価総地積（畑）（m2）"
      - name: assessed_land_residential_m2
        description: "B120103 評価総地積（宅地）（m2）"
      - name: assessed_land_mountain_m2
        description: "B120104 評価総地積（山林）（m2）"
      - name: assessed_land_pasture_m2
        description: "B120105 評価総地積（牧場）（m2）"
      - name: assessed_land_wasteland_m2
        description: "B120106 評価総地積（原野）（m2）"
      - name: assessed_land_other_m2
        description: "B120107 評価総地積（その他）（m2）"
      - name: afforestation_area_ha
        description: "B1303 人工造林面積（ha）"
